<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restoration Protocol</title>
    <style>
        /* ── Reset & Base ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #060a12;
            color: #f1f5f9;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(59, 130, 246, .06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(139, 92, 246, .06) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 0%, rgba(251, 191, 36, .04) 0%, transparent 50%);
        }

        #game-container {
            width: 100%;
            max-width: 1100px;
            background: rgba(12, 18, 28, 0.92);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(59, 130, 246, .15);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, .9), inset 0 1px 0 rgba(255, 255, 255, .04);
            display: flex;
            flex-direction: column;
            gap: 14px;
            position: relative;
            overflow: hidden;
        }

        /* ── Splash Overlay ── */
        #splash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            text-align: center;
            background-size: cover;
            background-position: center;
            background-image: url('assets/raniramli-nature.gif');
            background-color: #0b0f17;
            transition: opacity 1s ease, visibility 1s ease;
        }
        #splash-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        #splash-overlay::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(6, 10, 18, 0.65);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 1;
        }
        .splash-content {
            position: relative;
            z-index: 2;
            max-width: 720px;
            padding: 20px;
        }
        .splash-title {
            font-size: 4.5rem;
            font-weight: 900;
            color: #fbbf24;
            text-shadow: 0 0 30px rgba(251, 191, 36, 0.5), 0 0 60px rgba(251, 191, 36, 0.2);
            letter-spacing: 0.06em;
            margin-bottom: 20px;
            line-height: 1.1;
        }
        .splash-story {
            font-size: 1.3rem;
            font-weight: 400;
            color: #e2e8f0;
            line-height: 1.6;
            margin-bottom: 40px;
            min-height: 4em;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }
        .splash-story .cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #fbbf24;
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: blink 0.8s step-end infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .start-btn {
            background: linear-gradient(145deg, #fbbf24, #f59e0b);
            border: none;
            border-radius: 60px;
            padding: 18px 48px;
            font-size: 1.6rem;
            font-weight: 800;
            color: #0b0f17;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(251, 191, 36, 0.4);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            font-family: inherit;
            letter-spacing: 0.04em;
        }
        .start-btn:hover {
            transform: scale(1.06);
            box-shadow: 0 12px 40px rgba(251, 191, 36, 0.6);
        }

        @media (max-width: 768px) {
            .splash-title { font-size: 3rem; }
            .splash-story { font-size: 1.1rem; }
            .start-btn { font-size: 1.3rem; padding: 14px 32px; }
        }
        @media (max-width: 480px) {
            .splash-title { font-size: 2.2rem; }
            .splash-story { font-size: 0.95rem; }
            .start-btn { font-size: 1.0rem; padding: 12px 24px; }
        }

        /* ── Existing game styles (abbreviated) ── */
        #biome-health-container {
            width: 100%;
            height: 32px;
            background: rgba(15, 23, 42, .8);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(59, 130, 246, .15);
            position: relative;
            box-shadow: inset 0 2px 6px rgba(0, 0, 0, .5);
        }
        #biome-health-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #dc2626, #f59e0b, #22c55e, #86efac);
            background-size: 300% 100%;
            transition: width 0.9s cubic-bezier(.16, 1, .3, 1);
            border-radius: 16px;
        }
        #biome-text {
            position: absolute;
            width: 100%;
            text-align: center;
            font-weight: 700;
            font-size: 0.85rem;
            line-height: 32px;
            color: rgba(255, 255, 255, 0.7);
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.8);
            z-index: 1;
            pointer-events: none;
        }
        #story-container {
            width: 100%;
            text-align: center;
            font-size: 0.95rem;
            color: #e2e8f0;
            padding: 6px 12px;
            border-radius: 8px;
            min-height: 2.4em;
            line-height: 1.5;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(59, 130, 246, .08);
            transition: all 0.3s ease;
        }
        #story-container.good { background: rgba(34, 197, 94, 0.15); border-color: rgba(34, 197, 94, 0.3); }
        #story-container.bad { background: rgba(239, 68, 68, 0.15); border-color: rgba(239, 68, 68, 0.3); }
        #story-container.neutral { background: rgba(139, 92, 246, 0.1); border-color: rgba(139, 92, 246, 0.2); }

        #anomaly-panel {
            background: rgba(15, 23, 42, .6);
            border: 1px solid rgba(59, 130, 246, .12);
            border-radius: 14px;
            padding: 12px 18px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: all 0.3s ease;
        }
        #anomaly-panel.has-anomaly {
            border-color: rgba(168, 85, 247, .5);
            background: rgba(20, 10, 40, .7);
        }
        #anomaly-panel.has-anomaly.anomaly-flare { border-color: #f97316; box-shadow: 0 0 20px rgba(249, 115, 22, 0.15); }
        #anomaly-panel.has-anomaly.anomaly-catalyst { border-color: #a855f7; box-shadow: 0 0 20px rgba(168, 85, 247, 0.15); }
        #anomaly-panel.has-anomaly.anomaly-tremor { border-color: #b45309; box-shadow: 0 0 20px rgba(180, 83, 9, 0.15); }

        .anomaly-header-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .anomaly-title-text {
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: #94a3b8;
            white-space: nowrap;
        }
        .anomaly-panel-message {
            font-size: 0.95rem;
            color: #f1f5f9;
            font-weight: 500;
            flex: 1;
            min-width: 150px;
            line-height: 1.4;
        }
        .anomaly-panel-message strong { color: #fbbf24; }

        .anomaly-timer {
            font-size: 0.8rem;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .anomaly-timer .bar {
            width: 60px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        .anomaly-timer .bar .fill {
            height: 100%;
            background: #fbbf24;
            transition: width 1s linear;
        }

        .anomaly-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 2px;
            align-items: center;
        }
        .anomaly-action-btn {
            border: none;
            border-radius: 40px;
            padding: 8px 18px;
            font-weight: 700;
            font-size: 0.85rem;
            color: #fff;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(30, 41, 59, .7);
            border: 1px solid rgba(59, 130, 246, .2);
            font-family: inherit;
            white-space: nowrap;
        }
        .anomaly-action-btn:hover { transform: scale(1.04); }
        .anomaly-action-btn.anomaly-flare { background: linear-gradient(145deg, #f97316, #ea580c); border-color: #f97316; }
        .anomaly-action-btn.anomaly-catalyst { background: linear-gradient(145deg, #8b5cf6, #7c3aed); border-color: #a855f7; }
        .anomaly-action-btn.anomaly-tremor { background: linear-gradient(145deg, #d97706, #b45309); border-color: #b45309; }
        .anomaly-action-btn.risk-btn { background: linear-gradient(145deg, #3b82f6, #2563eb); border-color: #3b82f6; }

        .anomaly-empty-text {
            color: #64748b;
            font-size: 0.95rem;
            font-style: italic;
            text-align: center;
            padding: 4px 0;
        }

        #species-registry-bar {
            width: 100%;
            background: rgba(8, 14, 26, 0.7);
            border: 1px solid rgba(59, 130, 246, .12);
            border-radius: 14px;
            padding: 12px 16px;
            min-height: 75px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        #species-registry-bar .empty-text {
            color: #64748b;
            font-style: italic;
            font-size: 0.9rem;
        }

        .registry-item-compact {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(15, 23, 42, .6);
            border: 1px solid rgba(59, 130, 246, .3);
            border-radius: 10px;
            padding: 4px 10px 6px 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 60px;
            position: relative;
        }
        .registry-item-compact:hover { transform: translateY(-3px) scale(1.05); background: rgba(30, 41, 59, 0.9); }
        .registry-item-compact .icon { font-size: 2rem; line-height: 1.2; margin-bottom: 1px; }
        .registry-item-compact .impact-mini {
            display: flex;
            gap: 5px;
            font-size: 0.65rem;
            font-weight: 700;
        }
        .registry-item-compact .impact-mini .pos { color: #4ade80; }
        .registry-item-compact .impact-mini .neg { color: #f87171; }
        .registry-item-compact .impact-mini .neutral { color: #64748b; }
        .registry-item-compact.hibernating { opacity: 0.4; filter: grayscale(100%); border-color: #334155; }
        .registry-item-compact.hibernating::after {
            content: '💤';
            position: absolute;
            top: -8px;
            right: -8px;
            font-size: 1.2rem;
        }

        #main-row { display: flex; gap: 20px; align-items: stretch; }
        #left-panel {
            width: 300px;
            flex-shrink: 0;
            background: rgba(0, 0, 0, 0.75);
            border: 1px solid rgba(59, 130, 246, .2);
            border-radius: 14px;
            padding: 16px 18px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #left-energy-display {
            font-size: 2.6rem;
            font-weight: 900;
            color: #fbbf24;
            text-shadow: 0 0 20px #fbbf24, 0 0 40px rgba(251, 191, 36, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 4px 0;
            border-bottom: 1px solid rgba(59, 130, 246, .2);
            margin-bottom: 2px;
        }
        #left-energy-display span { font-size: 2.6rem; }

        .left-gauge { display: flex; flex-direction: column; gap: 2px; }
        .left-gauge-header { display: flex; justify-content: space-between; align-items: center; gap: 6px; }
        .action-btn {
            background: rgba(30, 41, 59, .7);
            color: #e2e8f0;
            border: 1px solid rgba(59, 130, 246, .3);
            padding: 5px 10px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            position: relative;
            font-size: 0.75rem;
            font-family: inherit;
            text-align: left;
            height: 30px;
        }
        .action-btn .btn-progress {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            background: rgba(59, 130, 246, .2);
            z-index: 1;
            transition: width 1s linear;
            border-radius: 6px;
        }
        .action-btn .btn-content {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .action-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .action-btn:not(:disabled):hover { background: rgba(51, 65, 85, .9); }

        .gauge-val {
            font-weight: 700;
            color: #f1f5f9;
            min-width: 40px;
            text-align: right;
            font-size: 0.8rem;
        }
        .meter-wrap {
            width: 100%;
            height: 18px;
            background: rgba(30, 41, 59, .7);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }
        .meter-fill {
            height: 100%;
            transition: width 0.9s cubic-bezier(.16, 1, .3, 1);
            border-radius: 6px;
        }
        .air-fill { background: linear-gradient(90deg, #94a3b8, #e2e8f0); }
        .water-fill { background: linear-gradient(90deg, #0284c7, #38bdf8); }
        .soil-fill { background: linear-gradient(90deg, #854d0e, #a16207); }
        .meter-label {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.85);
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.7);
            z-index: 2;
            pointer-events: none;
            letter-spacing: .04em;
        }

        #viewport {
            flex: 1;
            min-height: 420px;
            border-radius: 16px;
            border: 2px solid rgba(59, 130, 246, .15);
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
            transition: filter 1s ease;
            background-image: url('assets/sunrise.gif');
            background-color: #0b0f17;
        }
        #creature-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .creature-emoji {
            position: absolute;
            font-size: 3.5rem;
            filter: drop-shadow(0 8px 20px rgba(0, 0, 0, .7));
            animation: floatCreature 5s ease-in-out infinite alternate;
            pointer-events: none;
        }
        @keyframes floatCreature { 0% { transform: translateY(0); } 100% { transform: translateY(-16px); } }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(6, 10, 18, .85);
            backdrop-filter: blur(8px);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.show { display: flex; }

        .modal-content {
            background: rgba(12, 18, 28, .96);
            border: 1px solid rgba(59, 130, 246, .3);
            border-radius: 18px;
            width: 92%;
            max-width: 650px;
            padding: 24px 28px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(59, 130, 246, .1);
            padding-bottom: 10px;
        }
        .modal-header h3 { color: #fbbf24; font-size: 1.3rem; margin: 0; }
        .modal-close {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 2rem;
            cursor: pointer;
            line-height: 1;
        }
        .modal-close:hover { color: #f1f5f9; }

        .modal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
        }
        .species-card {
            background: rgba(15, 23, 42, .8);
            border: 1px solid rgba(59, 130, 246, .1);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            opacity: 0.35;
            filter: grayscale(100%);
            transition: all 0.3s ease;
        }
        .species-card.discovered {
            opacity: 1;
            filter: grayscale(0%);
            border-color: rgba(251, 191, 36, .25);
        }
        .species-card .icon { font-size: 2.8rem; display: block; margin-bottom: 4px; }
        .species-card .name { font-weight: 600; color: #94a3b8; font-size: 0.85rem; }
        .species-card.discovered .name { color: #f1f5f9; }
        .species-card .stats {
            font-size: 0.7rem;
            font-weight: 700;
            margin-top: 4px;
            padding-top: 4px;
            border-top: 1px solid rgba(59, 130, 246, .08);
            display: flex;
            justify-content: center;
            gap: 8px;
        }
        .species-card .stats .pos { color: #4ade80; }
        .species-card .stats .neg { color: #f87171; }
        .species-card .stats .neutral { color: #64748b; }

        #species-detail-modal .modal-content {
            max-width: 400px;
            text-align: center;
            align-items: center;
        }
        #species-detail-modal .detail-icon { font-size: 4.5rem; line-height: 1.2; }
        #species-detail-modal .detail-name { font-size: 1.4rem; font-weight: 700; color: #fbbf24; }
        #species-detail-modal .detail-desc {
            font-size: 0.95rem;
            color: #e2e8f0;
            line-height: 1.5;
            white-space: pre-line;
            text-align: center;
        }
        #species-detail-modal .detail-stats {
            display: flex;
            gap: 16px;
            font-size: 0.9rem;
            font-weight: 700;
            padding: 6px 14px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
        }
        #species-detail-modal .detail-stats .pos { color: #4ade80; }
        #species-detail-modal .detail-stats .neg { color: #f87171; }
        #species-detail-modal .detail-stats .neutral { color: #64748b; }
        .detail-close-btn {
            background: rgba(30, 41, 59, .7);
            border: 1px solid rgba(59, 130, 246, .2);
            color: #e2e8f0;
            padding: 6px 24px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: inherit;
            transition: all 0.2s;
        }
        .detail-close-btn:hover { background: rgba(51, 65, 85, .9); transform: scale(1.04); }

        @media (max-width: 768px) {
            #game-container { padding: 16px; }
            #main-row { flex-direction: column; }
            #left-panel { width: 100%; }
            #viewport { min-height: 300px; }
            #left-energy-display { font-size: 2.2rem; }
            #left-energy-display span { font-size: 2.2rem; }
            .anomaly-actions { flex-direction: column; align-items: stretch; }
            .anomaly-action-btn { justify-content: center; }
            .modal-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 480px) {
            #left-energy-display { font-size: 1.8rem; }
            #left-energy-display span { font-size: 1.8rem; }
            .registry-item-compact { padding: 3px 6px; min-width: 50px; }
            .registry-item-compact .icon { font-size: 1.6rem; }
            .modal-grid { grid-template-columns: 1fr 1fr; }
            #species-detail-modal .detail-icon { font-size: 3.2rem; }
            .anomaly-panel-message { font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <!-- Splash Overlay -->
    <div id="splash-overlay">
        <div class="splash-content">
            <div class="splash-title">Restoration Protocol</div>
            <div class="splash-story" id="story-text">
                <span id="typewriter"></span><span class="cursor"></span>
            </div>
            <button class="start-btn" id="start-btn">▶ Start Game</button>
        </div>
    </div>

    <!-- Game Container -->
    <div id="game-container">

        <div id="biome-health-container">
            <div id="biome-text">🌍 <span id="world-name-display">The Barren Dawn</span> – Health: <span id="biome-health-pct">0%</span></div>
            <div id="biome-health-bar"></div>
        </div>

        <div id="story-container">🌱 The barren crust awaits your touch.</div>

        <div id="anomaly-panel">
            <div class="anomaly-header-row">
                <span class="anomaly-title-text">🔮 Anomaly</span>
                <span class="anomaly-panel-message" id="anomaly-message">Scanning surface for random events…</span>
                <span class="anomaly-timer" id="anomaly-timer" style="display:none;">
                    <span id="timer-label">30s</span>
                    <span class="bar"><span class="fill" id="timer-fill" style="width:100%;"></span></span>
                </span>
            </div>
            <div class="anomaly-actions" id="anomaly-actions"></div>
        </div>

        <div id="species-registry-bar">
            <span class="empty-text">🔍 Restore biome to attract life.</span>
        </div>

        <div id="main-row">
            <div id="left-panel">
                <div style="display:flex; justify-content:space-between; align-items:center; color:#94a3b8; font-weight:bold; border-bottom:1px solid rgba(59,130,246,0.2); padding-bottom:5px;">
                    <span id="left-biome-name" style="color:#fbbf24; font-size:0.95rem;">The Barren Dawn</span>
                    <button onclick="openRegistry()" style="background:none; border:none; font-size:1.3rem; cursor:pointer;">📂</button>
                </div>

                <div id="left-energy-display">⚡ <span id="energy-val">0</span></div>

                <div class="left-gauge">
                    <div class="left-gauge-header">
                        <button id="btn-air" class="action-btn" onclick="takeAction('air')">
                            <div class="btn-progress" id="progress-air"></div>
                            <div class="btn-content"><span id="title-air">💨 Scrub</span></div>
                        </button>
                        <span id="air-val" class="gauge-val">0%</span>
                    </div>
                    <div class="meter-wrap">
                        <div id="air-fill" class="meter-fill air-fill" style="width:0%;"></div>
                        <div class="meter-label" id="label-air">💨 Air</div>
                    </div>
                </div>

                <div class="left-gauge">
                    <div class="left-gauge-header">
                        <button id="btn-water" class="action-btn" onclick="takeAction('water')">
                            <div class="btn-progress" id="progress-water"></div>
                            <div class="btn-content"><span id="title-water">💧 Flush</span></div>
                        </button>
                        <span id="water-val" class="gauge-val">0%</span>
                    </div>
                    <div class="meter-wrap">
                        <div id="water-fill" class="meter-fill water-fill" style="width:0%;"></div>
                        <div class="meter-label" id="label-water">💧 Water</div>
                    </div>
                </div>

                <div class="left-gauge">
                    <div class="left-gauge-header">
                        <button id="btn-soil" class="action-btn" onclick="takeAction('soil')">
                            <div class="btn-progress" id="progress-soil"></div>
                            <div class="btn-content"><span id="title-soil">🌱 Neutralize</span></div>
                        </button>
                        <span id="soil-val" class="gauge-val">0%</span>
                    </div>
                    <div class="meter-wrap">
                        <div id="soil-fill" class="meter-fill soil-fill" style="width:0%;"></div>
                        <div class="meter-label" id="label-soil">🌱 Soil</div>
                    </div>
                </div>
            </div>

            <div id="viewport">
                <div id="creature-layer"></div>
            </div>
        </div>
    </div>

    <!-- Species Registry Modal -->
    <div class="modal-overlay" id="species-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📂 Discovered Species</h3>
                <button class="modal-close" onclick="closeModal('species-modal')">&times;</button>
            </div>
            <div class="modal-grid" id="species-grid"></div>
        </div>
    </div>

    <!-- Species Detail Modal -->
    <div class="modal-overlay" id="species-detail-modal">
        <div class="modal-content">
            <div class="detail-icon" id="detail-icon">🦠</div>
            <div class="detail-name" id="detail-name">Species</div>
            <div class="detail-desc" id="detail-desc">Description</div>
            <div class="detail-stats">
                <span>💨 <span id="detail-air" class="neutral">0.00</span></span>
                <span>💧 <span id="detail-water" class="neutral">0.00</span></span>
                <span>🌱 <span id="detail-soil" class="neutral">0.00</span></span>
            </div>
            <button class="detail-close-btn" onclick="closeModal('species-detail-modal')">Close</button>
        </div>
    </div>

    <script>
        // ── Splash Screen Typewriter ──
        const storyLines = [
            "Restoration Protocol – Our mission: to terraform two dying worlds.",
            "Purify air, water, and soil. Discover new species. Manage energy.",
            "Survive unpredictable anomalies. Every choice shapes the planet's rebirth.",
            "Are you ready to restore life?"
        ];

        let charIndex = 0;
        let lineIndex = 0;
        const typewriterEl = document.getElementById('typewriter');

        function typeNextChar() {
            if (lineIndex >= storyLines.length) return;
            const currentLine = storyLines[lineIndex];
            if (charIndex < currentLine.length) {
                typewriterEl.textContent += currentLine.charAt(charIndex);
                charIndex++;
                setTimeout(typeNextChar, 30); // typing speed
            } else {
                // Line complete: add line break and move to next
                typewriterEl.textContent += '\n';
                lineIndex++;
                charIndex = 0;
                // If there are more lines, continue after a pause
                if (lineIndex < storyLines.length) {
                    setTimeout(typeNextChar, 400);
                }
            }
        }

        // Start typewriter after page load
        window.addEventListener('load', function() {
            setTimeout(typeNextChar, 600);
        });

        // ── Start Button ──
        document.getElementById('start-btn').addEventListener('click', function() {
            const overlay = document.getElementById('splash-overlay');
            overlay.classList.add('hidden');
            // Unmute any background audio if needed
            // (no audio, so just proceed)
        });

        // ── Game Script (same as before, with minor adjustments) ──
        const state = {
            energy: 40,
            toxicity: { air: 100, water: 100, soil: 100 },
            level: 1,
            world: 1,
            baseActionCost: 25,
            worldCompleted: false
        };

        const cooldowns = { air: 0, water: 0, soil: 0 };
        const discovered = new Set();
        const activeSpecies = new Set();

        let activeAnomaly = null;
        let anomalyTimeLeft = 0;
        const ANOMALY_MAX_TIME = 30;
        let riskAssessed = false;

        const WORLDS = {
            1: {
                name: "The Barren Dawn",
                meterLabels: {
                    air: { icon: '💨', label: 'Air', btn: 'Scrub' },
                    water: { icon: '💧', label: 'Water', btn: 'Flush' },
                    soil: { icon: '🌱', label: 'Soil', btn: 'Neutralize' }
                },
                levels: [
                    { background: "assets/sunrise.gif", description: "🌱 The barren crust awaits your touch." },
                    { background: "assets/Mountain Sunset.gif", description: "🌿 The first signs of life emerge." },
                    { background: "assets/Lake.gif", description: "🌳 Lush vegetation reclaims the land." },
                    { background: "assets/paradise.gif", description: "🌺 Paradise is reborn." }
                ],
                species: [
                    { id: "microbe", name: "Airborne Microbe", icon: "🦠", desc: "Feeds on floating carbon residues, purifying the air.",
                        req: { type: "air", val: 80 }, pos: { top: "20%", left: "70%" }, impact: { air: -0.15, water: 0.05, soil: 0 } },
                    { id: "spore", name: "Pioneer Spore", icon: "🍄", desc: "Roots rapidly into hard substrates, breaking down soil toxins.",
                        req: { type: "soil", val: 75 }, pos: { top: "75%", left: "15%" }, impact: { air: 0, water: 0.05, soil: -0.15 } },
                    { id: "amphib", name: "Mud Skipper", icon: "🐸", desc: "Filters water contaminants through its porous skin.",
                        req: { type: "water", val: 60 }, pos: { top: "80%", left: "50%" }, impact: { air: 0, water: -0.15, soil: 0.05 } },
                    { id: "fern", name: "Oasis Fern", icon: "🌿", desc: "Absorbs soil impurities and releases oxygen.",
                        req: { type: "soil", val: 40 }, pos: { top: "62%", left: "10%" }, impact: { air: 0.05, water: 0, soil: -0.15 } },
                    { id: "butterfly", name: "Dawn Butterfly", icon: "🦋", desc: "Spreads vital restoration pollen across the biome.",
                        req: { type: "air", val: 30 }, pos: { top: "28%", left: "30%" }, impact: { air: -0.12, water: 0.03, soil: 0.03 } }
                ],
                anomalies: [
                    { id: 'flare', level: 1, cssClass: 'anomaly-flare', 
                      desc: 'A massive solar flare is barreling toward the sector. Siphoning its plasma could yield a huge energy boost, but the containment field is unstable.',
                      options: [{ label: 'Siphon Energy', action: 'siphon' }] },
                    { id: 'tremor', level: 2, cssClass: 'anomaly-tremor', 
                      desc: 'Deep tectonic tremors suggest a geothermal pocket is rising. Drilling could tap into limitless power, but might trigger a toxic gas release.',
                      options: [{ label: 'Deploy Drill', action: 'drill' }] },
                    { id: 'catalyst', level: 3, cssClass: 'anomaly-catalyst', 
                      desc: 'A bio-catalyst meteor has struck the surface, releasing a reactive compound. Deploying it to the right biome layer could supercharge restoration, but the wrong choice may backfire.',
                      options: [{ label: 'Air', action: 'air' }, { label: 'Water', action: 'water' }, { label: 'Soil', action: 'soil' }] }
                ]
            },
            2: {
                name: "The Lightning Wastes",
                meterLabels: {
                    air: { icon: '⚡', label: 'Static', btn: 'Discharge' },
                    water: { icon: '🌊', label: 'Conductivity', btn: 'Dampen' },
                    soil: { icon: '🌀', label: 'Resonance', btn: 'Calm' }
                },
                levels: [
                    { background: "assets/lightning slow.gif", description: "⚡ Storm clouds gather, charged with fury." },
                    { background: "assets/sparkle clouds.gif", description: "⛈️ The sky crackles with potential." },
                    { background: "assets/pixel snowy river.gif", description: "❄️ Snow begins to fall, quieting the storm." }
                ],
                species: [
                    { id: "storm_sprite", name: "Storm Sprite", icon: "⚡", desc: "Dances in ionized air, purging static charge.",
                        req: { type: "air", val: 70 }, pos: { top: "15%", left: "60%" }, impact: { air: -0.18, water: 0.02, soil: 0.02 } },
                    { id: "ice_skimmer", name: "Ice Skimmer", icon: "🐟", desc: "Filters heavy metals from frozen waters.",
                        req: { type: "water", val: 40 }, pos: { top: "85%", left: "75%" }, impact: { air: 0.02, water: -0.17, soil: 0.03 } }
                ],
                anomalies: [
                    { id: 'ion_storm', level: 1, cssClass: 'anomaly-flare', 
                      desc: 'An ion storm is gathering – a chaotic maelstrom of charged particles. Harvesting its energy could be a windfall, but the voltage might fry your systems.',
                      options: [{ label: 'Harvest Energy', action: 'siphon' }] },
                    { id: 'crystal_surge', level: 2, cssClass: 'anomaly-catalyst', 
                      desc: 'A crystal surge is resonating with the planetary field. Channeling it into the right domain could stabilise the region, but misalignment may amplify the chaos.',
                      options: [{ label: 'Static', action: 'air' }, { label: 'Conductivity', action: 'water' }] }
                ]
            }
        };

        let currentSpecies = WORLDS[1].species;

        // Core Loop
        setInterval(() => {
            if (!state.worldCompleted) {
                state.energy = Math.min(200, state.energy + 1.0);
                state.toxicity.air = Math.min(100, state.toxicity.air + 0.03);
                state.toxicity.water = Math.min(100, state.toxicity.water + 0.03);
                state.toxicity.soil = Math.min(100, state.toxicity.soil + 0.03);
            }

            let pressure = { air: 0, water: 0, soil: 0 };
            currentSpecies.forEach(spec => {
                if (discovered.has(spec.id)) {
                    const met = state.toxicity[spec.req.type] <= spec.req.val;
                    if (met) {
                        if (!activeSpecies.has(spec.id)) {
                            activeSpecies.add(spec.id);
                            toggleCreature(spec.id, true);
                            setStory(`🌿 ${spec.name} has awoken!`, 'good');
                        }
                        pressure.air += spec.impact.air || 0;
                        pressure.water += spec.impact.water || 0;
                        pressure.soil += spec.impact.soil || 0;
                    } else {
                        if (activeSpecies.has(spec.id)) {
                            activeSpecies.delete(spec.id);
                            toggleCreature(spec.id, false);
                            setStory(`💤 ${spec.name} entered hibernation.`, 'bad');
                        }
                    }
                }
            });

            state.toxicity.air = Math.min(100, Math.max(0, state.toxicity.air + pressure.air));
            state.toxicity.water = Math.min(100, Math.max(0, state.toxicity.water + pressure.water));
            state.toxicity.soil = Math.min(100, Math.max(0, state.toxicity.soil + pressure.soil));

            Object.keys(cooldowns).forEach(k => { if (cooldowns[k] > 0) cooldowns[k]--; });

            handleAnomalies();
            updateHUD();
            updateBiomeHealth();
            updateRegistryBar();
            checkLevelProgression();
        }, 1000);

        // ── Game functions (same as before) ──
        function checkLevelProgression() {
            if (state.worldCompleted) return;

            const avg = (state.toxicity.air + state.toxicity.water + state.toxicity.soil) / 3;
            const wd = WORLDS[state.world];
            const maxLv = wd.levels.length;

            if (Math.round(state.toxicity.air) === 0 && Math.round(state.toxicity.water) === 0 && Math.round(state.toxicity.soil) === 0) {
                state.worldCompleted = true;
                state.toxicity = { air: 0, water: 0, soil: 0 };
                document.getElementById("viewport").style.backgroundImage = `url('${wd.levels[maxLv-1].background}')`;
                document.getElementById("next-world-btn").style.display = state.world === 1 ? "block" : "none";
                setStory(state.world === 1 ? "🏆 World 1 fully restored! Click 'Enter the Lightning Wastes' to continue." : "🏆 MISSION COMPLETE! Both worlds restored.", 'good');
                updateHUD();
                return;
            }

            let target = 1;
            if (avg <= 60 && avg > 20) target = 2;
            else if (avg <= 20) target = 3;
            if (target > maxLv) target = maxLv;

            if (target !== state.level) {
                const old = state.level;
                state.level = target;
                const lvData = wd.levels[target-1];
                if (lvData) {
                    document.getElementById("viewport").style.backgroundImage = `url('${lvData.background}')`;
                    if (target > old) setStory(`📡 Sector progressing: Level ${target} — ${lvData.description}`, 'good');
                    else setStory(`⚠️ Biome degrading: Reverted to Level ${target}`, 'bad');
                }
                clearAnomaly();
            }

            checkDiscoveries();
        }

        function checkDiscoveries() {
            currentSpecies.forEach(spec => {
                if (!discovered.has(spec.id) && state.toxicity[spec.req.type] <= spec.req.val) {
                    discovered.add(spec.id);
                    activeSpecies.add(spec.id);
                    const el = document.createElement('div');
                    el.id = `creature-${spec.id}`;
                    el.className = 'creature-emoji';
                    el.textContent = spec.icon;
                    el.style.top = spec.pos.top;
                    el.style.left = spec.pos.left;
                    document.getElementById('creature-layer').appendChild(el);
                    setStory(`🎉 New species discovered: ${spec.name}!`, 'good');
                    populateRegistryModal();
                }
            });
        }

        function toggleCreature(id, show) {
            const el = document.getElementById(`creature-${id}`);
            if (el) el.style.display = show ? 'block' : 'none';
        }

        function setStory(msg, type = 'neutral') {
            const el = document.getElementById('story-container');
            el.textContent = msg;
            el.className = type;
        }

        function handleAnomalies() {
            if (activeAnomaly) {
                anomalyTimeLeft--;
                if (anomalyTimeLeft <= 0) {
                    clearAnomaly('⏳ Anomaly dissipated. Opportunity lost.');
                } else {
                    const pct = (anomalyTimeLeft / ANOMALY_MAX_TIME) * 100;
                    document.getElementById('timer-fill').style.width = pct + '%';
                    document.getElementById('timer-label').textContent = Math.ceil(anomalyTimeLeft) + 's';
                }
            } else if (Math.random() < 0.05 && !state.worldCompleted) {
                triggerAnomaly();
            }
        }

        function triggerAnomaly() {
            const wd = WORLDS[state.world];
            const pool = wd.anomalies.filter(a => a.level === state.level);
            if (!pool.length) return;

            activeAnomaly = pool[Math.floor(Math.random() * pool.length)];
            anomalyTimeLeft = ANOMALY_MAX_TIME;
            riskAssessed = false;

            const panel = document.getElementById('anomaly-panel');
            panel.className = 'has-anomaly ' + activeAnomaly.cssClass;

            document.getElementById('anomaly-message').textContent = activeAnomaly.desc;
            document.getElementById('anomaly-timer').style.display = 'flex';

            const actions = document.getElementById('anomaly-actions');
            actions.innerHTML = '';

            const riskBtn = document.createElement('button');
            riskBtn.className = 'anomaly-action-btn risk-btn';
            riskBtn.innerHTML = `<span>📊 Assess Risk (⚡5)</span>`;
            riskBtn.onclick = () => assessRisk();
            actions.appendChild(riskBtn);

            activeAnomaly.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'anomaly-action-btn ' + activeAnomaly.cssClass;
                btn.innerHTML = `<span>${opt.label}</span>`;
                btn.onclick = () => resolveAnomaly(activeAnomaly.id, opt.action);
                actions.appendChild(btn);
            });
        }

        function assessRisk() {
            if (state.energy < 5) {
                setStory('⚠️ Not enough energy for risk assessment!', 'bad');
                return;
            }
            state.energy -= 5;
            const goodChance = Math.floor(Math.random() * 51) + 30;
            const badChance = 100 - goodChance;
            setStory(`📊 Risk Assessment: ${goodChance}% chance of favourable outcome, ${badChance}% chance of adverse effect.`, 'neutral');
            riskAssessed = true;
            updateHUD();
        }

        function resolveAnomaly(id, choice) {
            const roll = Math.random() * 100;
            let msg = '', type = 'neutral';
            const goodThreshold = 50;

            if (id === 'flare' || id === 'ion_storm') {
                if (roll < goodThreshold) {
                    const gain = Math.floor(Math.random() * 35) + 25;
                    state.energy = Math.min(200, state.energy + gain);
                    msg = `⚡ Energy siphoned! +${gain} Energy.`;
                    type = 'good';
                } else {
                    const loss = Math.floor(Math.random() * 20) + 15;
                    state.energy = Math.max(0, state.energy - loss);
                    msg = `💥 Circuit overload! -${loss} Energy.`;
                    type = 'bad';
                }
            } else if (id === 'catalyst' || id === 'crystal_surge') {
                if (roll < goodThreshold) {
                    state.toxicity[choice] = Math.max(0, state.toxicity[choice] - 20);
                    const label = WORLDS[state.world].meterLabels[choice].label;
                    msg = `✨ ${label} purified (-20%).`;
                    type = 'good';
                } else if (roll < goodThreshold + 20) {
                    state.toxicity[choice] = Math.min(100, state.toxicity[choice] + 15);
                    const label = WORLDS[state.world].meterLabels[choice].label;
                    msg = `☣️ ${label} contaminated (+15%).`;
                    type = 'bad';
                } else {
                    msg = `🧪 Compound dissolved harmlessly.`;
                    type = 'neutral';
                }
            } else if (id === 'tremor') {
                if (roll < goodThreshold) {
                    const gain = Math.floor(Math.random() * 50) + 30;
                    state.energy = Math.min(200, state.energy + gain);
                    msg = `⛰️ Geothermal tapped! +${gain} Energy.`;
                    type = 'good';
                } else {
                    state.toxicity.air = Math.min(100, state.toxicity.air + 18);
                    msg = `💨 Gas leak! Air +18%.`;
                    type = 'bad';
                }
            }

            clearAnomaly(msg, type);
            checkLevelProgression();
            updateHUD();
            updateBiomeHealth();
            updateRegistryBar();
        }

        function clearAnomaly(msg, type = 'neutral') {
            activeAnomaly = null;
            riskAssessed = false;
            document.getElementById('anomaly-panel').className = '';
            document.getElementById('anomaly-message').textContent = 'Scanning surface for random events…';
            document.getElementById('anomaly-timer').style.display = 'none';
            document.getElementById('anomaly-actions').innerHTML = '';
            if (msg) setStory(msg, type);
        }

        function updateHUD() {
            document.getElementById('energy-val').textContent = Math.floor(state.energy);

            ['air', 'water', 'soil'].forEach(t => {
                const cost = state.baseActionCost;
                const cd = cooldowns[t];
                const btn = document.getElementById(`btn-${t}`);
                const prog = document.getElementById(`progress-${t}`);
                const title = document.getElementById(`title-${t}`);
                const ml = WORLDS[state.world].meterLabels[t];

                title.innerHTML = cd > 0 ? `⏳ ${cd}s` : `${ml.icon} ${ml.btn} (⚡${cost})`;
                prog.style.width = cd > 0 ? ((10 - cd) / 10 * 100) + '%' : '100%';
                btn.disabled = cd > 0 || state.energy < cost || state.toxicity[t] === 0 || state.worldCompleted;

                const cleanliness = Math.round(100 - state.toxicity[t]);
                document.getElementById(`${t}-val`).textContent = cleanliness + '%';
                document.getElementById(`${t}-fill`).style.width = cleanliness + '%';
            });
        }

        function updateBiomeHealth() {
            const avg = (state.toxicity.air + state.toxicity.water + state.toxicity.soil) / 3;
            const health = Math.max(0, 100 - avg);
            document.getElementById('biome-health-bar').style.width = health + '%';
            document.getElementById('biome-health-pct').textContent = Math.round(health) + '%';
            document.getElementById('viewport').style.filter = `hue-rotate(${health * 0.9}deg)`;
        }

        function updateRegistryBar() {
            const bar = document.getElementById('species-registry-bar');
            if (discovered.size === 0) {
                bar.innerHTML = `<span class="empty-text">🔍 Restore biome to attract life.</span>`;
                return;
            }
            let html = '';
            discovered.forEach(id => {
                const spec = currentSpecies.find(s => s.id === id);
                if (!spec) return;
                const active = activeSpecies.has(id);
                const fmt = (v) => {
                    if (v < 0) return `<span class="neg">⬇${Math.abs(v).toFixed(1)}</span>`;
                    if (v > 0) return `<span class="pos">⬆${v.toFixed(1)}</span>`;
                    return `<span class="neutral">—</span>`;
                };
                html += `
                    <div class="registry-item-compact ${active ? '' : 'hibernating'}" onclick="showDetail('${id}')">
                        <span class="icon">${spec.icon}</span>
                        <div class="impact-mini">
                            ${fmt(spec.impact.air)}
                            ${fmt(spec.impact.water)}
                            ${fmt(spec.impact.soil)}
                        </div>
                    </div>
                `;
            });
            bar.innerHTML = html;
        }

        function showDetail(id) {
            const spec = currentSpecies.find(s => s.id === id);
            if (!spec) return;
            document.getElementById('detail-icon').textContent = spec.icon;
            document.getElementById('detail-name').textContent = spec.name;
            document.getElementById('detail-desc').textContent = spec.desc;

            const imp = spec.impact || { air: 0, water: 0, soil: 0 };
            ['air', 'water', 'soil'].forEach(t => {
                const el = document.getElementById(`detail-${t}`);
                const v = imp[t];
                el.textContent = v.toFixed(2);
                el.className = v < 0 ? 'neg' : v > 0 ? 'pos' : 'neutral';
            });

            document.getElementById('species-detail-modal').classList.add('show');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('show');
        }

        function openRegistry() {
            populateRegistryModal();
            document.getElementById('species-modal').classList.add('show');
        }

        function populateRegistryModal() {
            const grid = document.getElementById('species-grid');
            grid.innerHTML = '';
            currentSpecies.forEach(spec => {
                const found = discovered.has(spec.id);
                const fmt = (v) => {
                    if (v < 0) return `<span class="neg">⬇${Math.abs(v).toFixed(1)}</span>`;
                    if (v > 0) return `<span class="pos">⬆${v.toFixed(1)}</span>`;
                    return `<span class="neutral">—</span>`;
                };
                grid.innerHTML += `
                    <div class="species-card ${found ? 'discovered' : ''}">
                        <span class="icon">${found ? spec.icon : '❓'}</span>
                        <div class="name">${found ? spec.name : 'Undiscovered'}</div>
                        ${found ? `<div class="stats">${fmt(spec.impact.air)} ${fmt(spec.impact.water)} ${fmt(spec.impact.soil)}</div>` : ''}
                    </div>
                `;
            });
        }

        function takeAction(type) {
            const cost = state.baseActionCost;
            if (state.energy >= cost && state.toxicity[type] > 0 && cooldowns[type] === 0 && !state.worldCompleted) {
                state.energy -= cost;
                state.toxicity[type] = Math.max(0, state.toxicity[type] - 12);
                cooldowns[type] = 10;
                if (type === 'soil' && state.toxicity.water < 100) state.toxicity.water = Math.min(100, state.toxicity.water + 1);
                if (type === 'water' && state.toxicity.soil < 100) state.toxicity.soil = Math.min(100, state.toxicity.soil + 1);
                setStory(`💨 ${type.charAt(0).toUpperCase() + type.slice(1)} cleansed!`, 'good');
                updateHUD();
                checkLevelProgression();
            }
        }

        function startWorld2() {
            state.world = 2;
            state.level = 1;
            state.worldCompleted = false;
            state.toxicity = { air: 100, water: 100, soil: 100 };
            discovered.clear();
            activeSpecies.clear();
            currentSpecies = WORLDS[2].species;
            document.getElementById('creature-layer').innerHTML = '';

            document.getElementById('left-biome-name').textContent = WORLDS[2].name;
            document.getElementById('world-name-display').textContent = WORLDS[2].name;
            ['air', 'water', 'soil'].forEach(t => {
                document.getElementById(`label-${t}`).innerHTML = `${WORLDS[2].meterLabels[t].icon} ${WORLDS[2].meterLabels[t].label}`;
            });
            document.getElementById('next-world-btn').style.display = 'none';

            const lv = WORLDS[2].levels[0];
            document.getElementById('viewport').style.backgroundImage = `url('${lv.background}')`;
            setStory('⚡ Welcome to the Lightning Wastes. Stabilise the chaos.', 'neutral');
            updateHUD();
            updateBiomeHealth();
            updateRegistryBar();
            populateRegistryModal();
        }

        // Init
        window.onload = function() {
